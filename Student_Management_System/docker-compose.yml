services:
  database:
    image: mariadb:10.11
    container_name: sms_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_management_system
    ports:
      - "3307:3306"
    volumes:
      - sms_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sms_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: student_management_system
      JWT_SECRET: docker_student_management_secret
      JWT_EXPIRES_IN: 1d
      CLIENT_URL: http://localhost:5173
      MAX_UPLOAD_MB: 50
    volumes:
      - ./database:/database:ro
      - ./backend/uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sms_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  sms_mysql_data:
